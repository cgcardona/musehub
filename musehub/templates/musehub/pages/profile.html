{% extends "musehub/base.html" %}

{% block title %}@{{ username }}{% endblock %}
{% block breadcrumb %}<a href="/{{ username }}">@{{ username }}</a>{% endblock %}

{% block page_json %}{"page": "user-profile", "username": {{ username | tojson }}}{% endblock %}

{% block content %}
<div id="profile-hdr"><p class="loading">Loading profile…</p></div>
<div id="heatmap-section"></div>
<div id="badges-section"></div>
<div id="pinned-section"></div>
<div id="tabs-section" hidden>
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="repos">Repositories</button>
    <button class="tab-btn" data-tab="stars">Stars</button>
    <button class="tab-btn" data-tab="followers">Followers</button>
    <button class="tab-btn" data-tab="following">Following</button>
    <button class="tab-btn" data-tab="activity">Activity</button>
  </nav>
  <div id="tab-content"></div>
</div>
{% endblock %}
