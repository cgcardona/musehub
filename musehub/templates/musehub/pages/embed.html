<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — MuseHub</title>
  <link rel="stylesheet" href="/static/embed.css?v={{ static_version }}">
</head>
<body>
  <div class="player" id="player">
    <div class="player-header">
      <span class="logo-mark">&#127925;</span>
      <div class="track-info">
        <div class="track-title" id="track-title">Loading&#8230;</div>
        <div class="track-sub" id="track-sub">MuseHub</div>
      </div>
    </div>
    <div class="controls">
      <button class="play-btn" id="play-btn" disabled title="Play / Pause">&#9654;</button>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-cur">0:00</span>
          <span id="time-dur">0:00</span>
        </div>
      </div>
    </div>
    <div class="footer-link">
      <a href="{{ listen_url }}" target="_blank" rel="noopener">
        &#127925; View on MuseHub
      </a>
    </div>
  </div>
  <audio id="audio-el" preload="metadata"></audio>
  {# Embed player config — read by embed-player.js via JSON (no inline scripts) #}
  <script id="embed-data" type="application/json">{"repoId": {{ repo_id | tojson }}, "ref": {{ ref | tojson }}, "trackUrl": {{ track_url | tojson }}, "trackName": {{ track_name | tojson }}}</script>
  <script src="/static/embed-player.js"></script>
</body>
</html>
