name: CI

# Run on PRs targeting main (dev → main gate) and on merge commits landing on main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test & lint (Python 3.14)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: musehub
          POSTGRES_PASSWORD: musehub
          POSTGRES_DB: musehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://musehub:musehub@localhost:5432/musehub
      ACCESS_TOKEN_SECRET: ci-secret-not-for-production-use
      MUSE_ENV: test
      # Silence SQLAlchemy echo in CI output
      SQLALCHEMY_WARN_20: "1"
      # Opt into Node.js 24 for GitHub Actions runners ahead of the June 2026 forced migration
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Static type check (mypy)
        run: mypy musehub/ --ignore-missing-imports --no-error-summary
        continue-on-error: false

      - name: Run tests (parallel, with coverage)
        run: |
          pytest \
            -n auto \
            --cov=musehub \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Enforce coverage threshold
        run: coverage report --fail-under=60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy to musehub.ai
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on actual merges to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.EC2_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync code to EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='docker-compose.override.yml' \
            -e "ssh -o StrictHostKeyChecking=no" \
            . ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/musehub/

      - name: Reload nginx config
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo cp /opt/musehub/deploy/nginx-ssl.conf /etc/nginx/sites-available/musehub && sudo nginx -t && sudo nginx -s reload"

      - name: Rebuild and restart container
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /opt/musehub && docker compose up -d --build"

      - name: Wait for health check
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "for i in \$(seq 1 24); do
               STATUS=\$(docker inspect --format='{{.State.Health.Status}}' musehub 2>/dev/null)
               echo \"Attempt \$i: \$STATUS\"
               [ \"\$STATUS\" = 'healthy' ] && exit 0
               sleep 5
             done
             echo 'Container did not become healthy in time'
             docker logs musehub --tail 30
             exit 1"

      - name: Smoke test live site
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" https://musehub.ai/explore)
          echo "https://musehub.ai/explore → $CODE"
          [ "$CODE" = "200" ] || (echo "Smoke test failed" && exit 1)
