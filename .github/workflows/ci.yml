name: CI

# Run on PRs targeting main (dev → main gate) and on merge commits landing on main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test & lint (Python 3.11)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: musehub
          POSTGRES_PASSWORD: musehub
          POSTGRES_DB: musehub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://musehub:musehub@localhost:5432/musehub
      ACCESS_TOKEN_SECRET: ci-secret-not-for-production-use
      MUSE_ENV: test
      # Silence SQLAlchemy echo in CI output
      SQLALCHEMY_WARN_20: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Static type check (mypy)
        run: mypy musehub/ --ignore-missing-imports --no-error-summary
        continue-on-error: false

      - name: Run tests (parallel, with coverage)
        run: |
          pytest \
            -n auto \
            --cov=musehub \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Enforce coverage threshold
        run: coverage report --fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
