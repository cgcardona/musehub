# Development overrides — bind-mount source dirs so changes are reflected
# immediately without rebuilding the image.
#
# Active automatically when you run `docker compose` from this directory.
# Production deployments use docker-compose.yml alone (no override).
services:
  musehub:
    environment:
      DEBUG: "true"
      # Expose the muse source tree so the analysis service can import it.
      PYTHONPATH: "/muse:/app"
    volumes:
      - ./musehub:/app/musehub
      - ./tests:/app/tests
      - ./tools:/app/tools
      - ./scripts:/app/scripts
      - ./alembic:/app/alembic
      # Mount the muse package so MuseHub can import muse.plugins.code directly.
      - /Users/gabriel/muse:/muse
