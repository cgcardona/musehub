services:
  musehub:
    build: .
    container_name: musehub
    ports:
      - "10003:10003"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://musehub:${DB_PASSWORD:-musehub}@postgres:5432/musehub"
    volumes:
      - musehub_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: musehub_postgres
    environment:
      POSTGRES_DB: musehub
      POSTGRES_USER: musehub
      POSTGRES_PASSWORD: "${DB_PASSWORD:-musehub}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musehub -d musehub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Expose on 5434 (not 5432/5433) to avoid colliding with a locally-installed
    # Postgres or another project's container (e.g. agentception uses 5433).
    # This lets the local test suite and Alembic CLI reach the DB directly:
    #   DATABASE_URL=postgresql+asyncpg://musehub:musehub@localhost:5434/musehub
    #   make test       (the Makefile sets this automatically)
    #   alembic upgrade head
    ports:
      - "127.0.0.1:5434:5432"

volumes:
  musehub_data:
  postgres_data:
